<div id="view-report" class="view">
  <div class="import-tabs" style="margin-bottom: 20px;">
    <div id="report-tab-period" class="import-tab active" onclick="switchReportTab('period')">
      <span class="material-icons" style="vertical-align:middle; font-size:1.2rem;">event</span> 選択期間 (単月/四半期)
    </div>
    <div id="report-tab-ytd" class="import-tab" onclick="switchReportTab('ytd')">
      <span class="material-icons" style="vertical-align:middle; font-size:1.2rem;">history</span> 年度累計 (YTD)
    </div>
  </div>

  <div class="card">
    <h3 class="card-title" id="report-ranking-title" style="border-bottom:none; margin-bottom: 0;">チーム別 予実差異ランキング</h3>
    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
      <div style="flex: 1; min-width: 300px;">
        <h4 style="color: #1cc88a; border-bottom: 2px solid #1cc88a; padding-bottom: 5px; font-weight: 900; display:flex; align-items:center; gap:8px;">
          <span style="font-size:1.2rem; background:#1cc88a; color:#fff; padding:2px 8px; border-radius:4px;">GOOD</span>
          <span class="material-icons" style="font-size:1.4rem;">thumb_up</span> 
          乖離が少ない チーム TOP 3
        </h4>
        <div id="report-top3" style="display: flex; flex-direction: column; gap: 10px;"></div>
      </div>
      <div style="flex: 1; min-width: 300px;">
        <h4 style="color: #e74a3b; border-bottom: 2px solid #e74a3b; padding-bottom: 5px; font-weight: 900; display:flex; align-items:center; gap:8px;">
          <span style="font-size:1.2rem; background:#e74a3b; color:#fff; padding:2px 8px; border-radius:4px;">BAD</span>
          <span class="material-icons" style="font-size:1.4rem;">thumb_down</span> 
          乖離が大きい チーム ワースト 3
        </h4>
        <div id="report-worst3" style="display: flex; flex-direction: column; gap: 10px;"></div>
      </div>
    </div>
  </div>
  
  <h3 id="report-detail-title" style="margin-top: 30px; margin-bottom: 15px; color: #3f4254;">各チームの差異要因と総括コメント</h3>
  <div id="report-container" class="report-grid"></div>
</div>
