<div id="view-slideSettings" class="view" style="display:none;">
  <div class="card" style="border-top: 4px solid #fbbc04; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px;">
    <h3 class="card-title" style="color: #333; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px;">
      <span class="material-icons" style="color: #fbbc04; margin-right: 8px; font-size: 1.8rem;">slideshow</span>
      スライド連携 出力先URL設定
    </h3>
    
    <div style="background-color: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 25px;">
      <p style="margin-top: 0; color: #555; font-size: 0.95rem; line-height: 1.6;">
        ダッシュボード（創会用レポート等）から「スライド連携」ボタンを押した際、出力先となるGoogleスライドのURLを設定します。<br>
        <strong style="color:#e74a3b;">※出力先のスライドは「編集権限」があるものをご指定ください。</strong>
      </p>
      
      <label style="font-weight: bold; color: #333; display: block; margin-bottom: 8px; margin-top: 20px;">🔗 GoogleスライドのURL</label>
      <input type="text" id="setting-slide-url" class="form-control" style="width: 100%; padding: 12px; font-size: 1rem; border: 2px solid #b6d4fe; border-radius: 6px;" placeholder="https://docs.google.com/presentation/d/XXXXXX/edit">
      <div style="font-size: 0.8rem; color: #888; margin-top: 5px;">例: https://docs.google.com/presentation/d/1IrJGgwbPIy6uc.../edit</div>
    </div>
    
    <button class="btn" style="background:#fbbc04; color:#333; font-weight:900; font-size:1.1rem; padding:12px 30px; border:none; border-radius:6px; box-shadow: 0 2px 5px rgba(0,0,0,0.15);" onclick="saveSlideUrl()">
      <span class="material-icons" style="vertical-align:middle; margin-right:5px;">save</span> 出力先URLを保存する
    </button>
  </div>
</div>

<script>
  // スライドURLを保存する関数
  function saveSlideUrl() {
    const url = document.getElementById('setting-slide-url').value;
    if(!url) {
      alert("URLを入力してください。");
      return;
    }
    
    if(!confirm("このURLをスライド出力先に設定しますか？")) return;
    
    showLoading("URLを保存しています...");
    google.script.run.withSuccessHandler(res => {
      hideLoading();
      if(res && res.error) {
        alert("保存エラー: " + res.error);
      } else {
        alert("🎉 出力先スライドのURLを保存しました！\n次回からこのスライドに自動出力されます。");
      }
    }).withFailureHandler(e => {
      hideLoading();
      alert("通信エラー: " + e.message);
    }).saveSlideUrlConfig(url);
  }
</script>
