<div id="view-drilldown" class="view">
  <div class="card">
    <h3 class="card-title">階層別 予実詳細分析 <span style="font-size: 0.8rem; color: #888; font-weight: normal; margin-left: 10px;">※ 各行をクリックで下層を展開</span></h3>
    <table class="data-table">
      <thead>
        <tr>
          <th>勘定科目 ＞ チーム ＞ セグメント ＞ 取引先</th>
          <th style="text-align: right;">予算</th>
          <th style="text-align: right;">実績</th>
          <th style="text-align: right;">差異額</th>
          <th style="text-align: right;">差異率</th>
          <th style="width: 35%;">コメント（要因分析報告）</th>
        </tr>
      </thead>
      <tbody id="analysis-tbody"></tbody>
    </table>
  </div>
</div>

<div id="comment-modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9998; align-items:center; justify-content:center;">
  <div style="background:#fff; width: 500px; max-width: 90%; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow:hidden;">
    <div style="background:var(--primary); color:#fff; padding: 15px; font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
      <span>コメント入力</span>
      <span class="material-icons" style="cursor:pointer;" onclick="closeCommentModal()">close</span>
    </div>
    <div style="padding: 20px;">
      <div id="comment-modal-title" style="font-size:0.9rem; font-weight:bold; color:#555; margin-bottom:10px;"></div>
      <textarea id="comment-modal-text" style="width:100%; height:120px; padding:10px; border:1px solid #ccc; border-radius:4px; font-size:0.95rem; resize:vertical;" placeholder="差異の要因などを入力してください"></textarea>
      <input type="hidden" id="comment-modal-period">
      <input type="hidden" id="comment-modal-segCd">
      <input type="hidden" id="comment-modal-key">
      <input type="hidden" id="comment-modal-elem-id">
    </div>
    <div style="padding: 15px 20px; background:#f8f9fa; border-top:1px solid #eee; display:flex; justify-content:flex-end; gap:10px;">
      <button class="btn" style="background:#fff; color:#555; border:1px solid #ccc;" onclick="closeCommentModal()">キャンセル</button>
      <button class="btn" style="background:var(--primary);" id="comment-modal-save-btn" onclick="saveCommentFromModal()">保存する</button>
    </div>
  </div>
</div>
