<script>
  // ==========================================
  // 創会用レポート 画面用ロジック (強制1280px固定・絶対高画質版)
  // ==========================================

  if (typeof html2canvas === 'undefined') {
      const script = document.createElement('script');
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
      document.head.appendChild(script);
  }

  function switchSokaiTab(tab) {
    document.getElementById('sokai-content-report').style.display = tab === 'report' ? 'block' : 'none';
  }

  function printSokaiTeam(teamCd) {
    const printTarget = document.getElementById('print_card_' + teamCd);
    if (!printTarget) return;
    const printContent = printTarget.outerHTML;
    const printWindow = window.open('', '_blank', 'width=1150,height=850');
    const endScriptTag = '</' + 'script>';

    printWindow.document.write(`
        <html><head><title>創会レポート出力</title>
            <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
            <style>
                @page { size: A4 landscape; margin: 8mm; }
                body { background: #fff !important; margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
                .print-btn { display: none !important; }
                .action-hover:hover { background-color: transparent !important; }
                .team-print-card { width: 100%; max-width: 280mm; max-height: 194mm; padding: 5mm !important; margin: 0 auto !important; border: none !important; box-shadow: none !important; overflow: hidden; }
                * { color-adjust: exact !important; -webkit-print-color-adjust: exact !important; }
            </style>
        </head><body>${printContent}
            <script>window.onload = function() { setTimeout(function() { window.print(); window.close(); }, 500); };${endScriptTag}
        </body></html>
    `);
    printWindow.document.close();
  }

  // 💡 【超強化版】画面の縮小率を無視して、強制的に1280pxの巨大サイズで撮影する！
  async function exportAllTeamsToSlide() {
      if (typeof html2canvas === 'undefined') {
          alert('画像化エンジンの準備中です。数秒待ってからもう一度お試しください。');
          return;
      }
      
      const teamCards = document.querySelectorAll('.team-print-card');
      if (teamCards.length === 0) { alert('出力するデータがありません。先に「画面に表示」を押してください。'); return; }

      if (!confirm('全チームのレポートを高画質でスライドへ送信しますか？\n（1チームずつ丁寧に処理するため少し時間がかかります）')) return;

      const msgEl = document.getElementById('loading-message');
      showLoading(`スライド連携の準備中...`);

      try {
          for (let i = 0; i < teamCards.length; i++) {
              const card = teamCards[i];
              if(msgEl) msgEl.innerText = `高画質画像を生成中... (${i + 1} / ${teamCards.length} チーム目)`;
              
              const printBtns = card.querySelectorAll('.print-btn');
              printBtns.forEach(b => b.style.display = 'none');
              
              // 元のスタイルを記憶
              const originalBoxShadow = card.style.boxShadow;
              const originalBorder = card.style.border;
              const originalWidth = card.style.width;
              const originalMaxWidth = card.style.maxWidth;
              
              // 💡 撮影する一瞬だけ、スタイルを強制的に書き換える（魔法のトリック）
              card.style.boxShadow = 'none'; 
              card.style.border = 'none';
              card.style.width = '1280px';    // スライドに最適な1280pxに強制固定！
              card.style.maxWidth = '1280px'; // 画面の縮小制限をぶち破る
              
              const canvas = await html2canvas(card, { 
                  scale: 2, 
                  useCORS: true, 
                  backgroundColor: '#ffffff',
                  windowWidth: 1280 // HTML2Canvas側にも1280pxの画面だと信じ込ませる
              });
              const base64Str = canvas.toDataURL('image/png');
              const teamName = card.querySelector('h2').innerText.trim();

              // 撮影が終わったら、ユーザーの目に映る前に瞬時に元のサイズに戻す
              printBtns.forEach(b => b.style.display = '');
              card.style.boxShadow = originalBoxShadow;
              card.style.border = originalBorder;
              card.style.width = originalWidth;
              card.style.maxWidth = originalMaxWidth;
              
              if(msgEl) msgEl.innerText = `Googleスライドへ送信中... (${i + 1} / ${teamCards.length} チーム目)`;

              await new Promise((resolve, reject) => {
                  google.script.run
                      .withSuccessHandler(resolve)
                      .withFailureHandler(reject)
                      .appendSingleSlideImage(teamName, base64Str, i === 0);
              });
          }

          hideLoading();
          alert('🎉 全チームの高画質スライドの生成が完了しました！\n「スライド連携設定」で指定したURLを開いて確認してください。');
      } catch (err) {
          hideLoading();
          console.error(err);
          alert('処理中にエラーが発生しました: ' + err.message);
      }
  }

  function getVarianceStyle(diff) {
      if (diff < 0) return { color: '#1a73e8', prefix: '＋' }; 
      if (diff > 0) return { color: '#e74a3b', prefix: '▲' }; 
      return { color: '#95a5a6', prefix: '±' };
  }

  function openActionPlanModal(period, teamCd, teamName, currentTextParam) {
      document.getElementById('action-modal-period').value = period;
      document.getElementById('action-modal-team').value = teamCd;
      document.getElementById('action-modal-title').innerText = teamName + ' の今後のアクション';
      const txtArea = document.getElementById('action-modal-textarea');
      txtArea.value = decodeURIComponent(currentTextParam) || '';
      updateActionCharCount();
      txtArea.removeEventListener('input', updateActionCharCount); 
      txtArea.addEventListener('input', updateActionCharCount);
      document.getElementById('action-modal-overlay').style.display = 'flex';
  }

  function updateActionCharCount() {
      const maxLen = 50;
      const txtArea = document.getElementById('action-modal-textarea');
      if (txtArea.value.length > maxLen) txtArea.value = txtArea.value.substring(0, maxLen);
      document.getElementById('action-modal-char-count').innerText = `${txtArea.value.length} / ${maxLen} 文字`;
  }

  function closeActionPlanModal() { document.getElementById('action-modal-overlay').style.display = 'none'; }

  function saveActionPlan() {
      const period = document.getElementById('action-modal-period').value;
      const teamCd = document.getElementById('action-modal-team').value;
      const text = document.getElementById('action-modal-textarea').value;
      const btn = document.getElementById('action-modal-save-btn');
      btn.innerText = '保存中...'; btn.disabled = true;

      google.script.run.withSuccessHandler(() => {
          btn.innerText = '保存する'; btn.disabled = false;
          if (!globalPackage.reportComments) globalPackage.reportComments = {};
          globalPackage.reportComments[`${period}_action_${teamCd}`] = text;
          closeActionPlanModal();
          renderReportSoukai(globalPackage, globalPackage.subjectMapCache, parseInt(document.getElementById('displayUnit').value));
      }).withFailureHandler(e => {
          btn.innerText = '保存する'; btn.disabled = false; handleGenericError(e, 'saveReportComment');
      }).saveReportComment(period, `action_${teamCd}`, text);
  }

  function openSoukaiCommentModal(period, pCmtKey, displayName, historyParam, currentCmtParam, monthlyParam) {
    document.getElementById('soukai-modal-period').value = period;
    document.getElementById('soukai-modal-key').value = pCmtKey;
    document.getElementById('soukai-modal-title').innerText = displayName;
    
    const historyArr = JSON.parse(decodeURIComponent(historyParam));
    const selectEl = document.getElementById('soukai-modal-history');
    selectEl.innerHTML = '<option value="">過去の履歴を参照（クリックで追記）...</option>';
    if (historyArr && historyArr.length > 0) {
       historyArr.forEach(txt => {
           const opt = document.createElement('option');
           const match = txt.match(/^\[(.*?)\]\s(.*)$/);
           if(match) { opt.value = match[2]; opt.innerText = txt.substring(0, 45) + '...'; } 
           else { opt.value = txt; opt.innerText = txt.substring(0, 45) + '...'; }
           selectEl.appendChild(opt);
       });
    }

    const txtArea = document.getElementById('soukai-modal-textarea');
    txtArea.value = decodeURIComponent(currentCmtParam) || '';
    updateSoukaiByteCount();
    txtArea.removeEventListener('input', updateSoukaiByteCount); 
    txtArea.addEventListener('input', updateSoukaiByteCount);
    
    document.getElementById('soukai-modal-monthly-table').innerHTML = '<div style="color:#aaa; font-size:0.9rem;">月別推移は省略表示</div>';
    document.getElementById('soukai-modal-overlay').style.display = 'flex';
  }

  function getByteLength(str) {
      let len = 0;
      for (let i = 0; i < str.length; i++) { len += (str[i].match(/[ -~]/)) ? 1 : 2; }
      return len;
  }

  function updateSoukaiByteCount() {
      const maxBytes = 80; 
      const txtArea = document.getElementById('soukai-modal-textarea');
      let str = txtArea.value;
      
      if (getByteLength(str) > maxBytes) {
          let newStr = ''; let currentBytes = 0;
          for (let i = 0; i < str.length; i++) {
              let charByte = (str[i].match(/[ -~]/)) ? 1 : 2;
              if (currentBytes + charByte > maxBytes) break;
              newStr += str[i]; currentBytes += charByte;
          }
          txtArea.value = newStr; str = newStr;
      }
      
      const currentBytes = getByteLength(str);
      document.getElementById('soukai-modal-char-count').innerText = `${currentBytes} / ${maxBytes} Byte (全角換算: ${Math.floor(currentBytes/2)} / 40 文字)`;
  }

  function copyHistoryToTextarea() {
    const selectEl = document.getElementById('soukai-modal-history');
    if (selectEl.value) { 
      const txtArea = document.getElementById('soukai-modal-textarea');
      txtArea.value += (txtArea.value.trim() !== '' ? '\n' : '') + selectEl.value; 
      updateSoukaiByteCount(); 
      selectEl.selectedIndex = 0; 
    }
  }

  function closeSoukaiCommentModal() { document.getElementById('soukai-modal-overlay').style.display = 'none'; }

  function saveSoukaiComment() {
    const period = document.getElementById('soukai-modal-period').value;
    const pCmtKey = document.getElementById('soukai-modal-key').value;
    const text = document.getElementById('soukai-modal-textarea').value;
    const btn = document.getElementById('soukai-modal-save-btn');
    btn.innerText = '保存中...'; btn.disabled = true;

    google.script.run.withSuccessHandler(() => {
      btn.innerText = '保存する'; btn.disabled = false;
      if (!globalPackage.reportComments) globalPackage.reportComments = {};
      globalPackage.reportComments[`${period}_${pCmtKey}`] = text;
      closeSoukaiCommentModal();
      renderReportSoukai(globalPackage, globalPackage.subjectMapCache, parseInt(document.getElementById('displayUnit').value));
    }).withFailureHandler(e => {
      btn.innerText = '保存する'; btn.disabled = false; handleGenericError(e, 'saveReportComment');
    }).saveReportComment(period, pCmtKey, text);
  }

  // --- メイン描画処理 ---
  function renderReportSoukai(pkg, subjectMap, unit) {
    const analysisContainer = document.getElementById('sokai-team-analysis');
    if(!analysisContainer) return;

    const isPeriod = (typeof currentDashTab !== 'undefined' && currentDashTab === 'period') || (typeof currentReportTab !== 'undefined' && currentReportTab === 'period');
    const rawData = isPeriod ? pkg.cacheData.currentMonthAllSegments : pkg.cacheData.ytdAllSegments;
    const targetPeriod = pkg.params ? pkg.params.period : 'UNKNOWN';

    if (!rawData || rawData.length === 0) {
      analysisContainer.innerHTML = '<div style="color:#888; text-align:center; padding:30px;">データがまだインポートされていません。</div>';
      return;
    }

    const teams = {}; const soukaiComments = pkg.reportComments || {}; 

    rawData.forEach(r => {
      if (r.isPrev || !subjectMap[r.acctName]) return;
      const tInfo = pkg.teamSettings.find(t => t.teamCd === r.teamCd);
      if (!tInfo || tInfo.isHidden) return;

      const tCd = r.teamCd;
      if (!teams[tCd]) teams[tCd] = { cd: tCd, name: tInfo.teamName, b: 0, a: 0, accts: {} };
      const acct = r.acctName;
      if (!teams[tCd].accts[acct]) teams[tCd].accts[acct] = { name: acct, b: 0, a: 0, partners: {} };
      const pKey = r.partnerName || '取引先なし';
      if (!teams[tCd].accts[acct].partners[pKey]) teams[tCd].accts[acct].partners[pKey] = { name: pKey, b: 0, a: 0, history: new Set(), monthly: {} };

      const amt = Number(r.amount) || 0;
      const isBudget = r.type === '予算' || String(r.type).includes('予算');
      if (isBudget) { teams[tCd].b += amt; teams[tCd].accts[acct].b += amt; teams[tCd].accts[acct].partners[pKey].b += amt; } 
      else { teams[tCd].a += amt; teams[tCd].accts[acct].a += amt; teams[tCd].accts[acct].partners[pKey].a += amt; }
    });

    const teamList = [];
    Object.values(teams).forEach(t => {
      if (t.b === 0 && t.a === 0) return;
      t.diff = t.a - t.b;
      const acctList = [];
      Object.values(t.accts).forEach(act => {
        act.diff = act.a - act.b; act.diffAbs = Math.abs(act.diff);
        if (act.b > 0 || act.a > 0) acctList.push(act);
      });
      acctList.sort((a, b) => b.diffAbs - a.diffAbs);
      t.worst3 = acctList.slice(0, 3);
      t.totalErrorAbs = acctList.reduce((sum, curr) => sum + curr.diffAbs, 0);
      teamList.push(t);
    });

    let analysisHtml = '';
    const circles = ["①", "②", "③"];

    teamList.forEach(t => {
       const tStyle = getVarianceStyle(t.diff);
       const actionKey = `${targetPeriod}_action_${t.cd}`;
       const actionText = soukaiComments[actionKey] || '予算精度向上のため、未割り当て枠を極小化し、月次の予実レビュー体制を強化します。';
       const actionParam = encodeURIComponent(actionText);

       analysisHtml += `
         <div id="print_card_${t.cd}" class="team-print-card" style="background:#fff; border:1px solid #e0e0e0; border-radius:12px; padding:25px; margin-bottom:30px; position:relative;">
           <button class="btn print-btn" style="position:absolute; top:20px; right:25px; background:#1a73e8; color:white; border:none; padding:6px 12px; border-radius:4px; font-weight:bold; display:flex; align-items:center; gap:5px; cursor:pointer;" onclick="printSokaiTeam('${t.cd}')">
             <span class="material-icons" style="font-size:1.1rem;">print</span> PDF印刷
           </button>
           <h2 style="color:#0056b3; border-bottom:2px solid #e0e0e0; padding-bottom:8px; margin-top:0; margin-bottom:15px; font-size:1.4rem;">
             【${t.name}】四半期 予算実績差異分析
           </h2>
           <div style="display:flex; justify-content:space-between; margin-bottom:15px; gap:15px;">
             <div style="flex:1; background:#f8f9fa; border:1px solid #eee; border-radius:6px; padding:10px; text-align:center;">
               <div style="font-size:0.8rem; color:#666; font-weight:bold;">チーム総予算</div>
               <div style="font-size:1.4rem; font-weight:900; color:#333;">${formatMoney(t.b, unit)}</div>
             </div>
             <div style="flex:1; background:#f8f9fa; border:1px solid #eee; border-radius:6px; padding:10px; text-align:center;">
               <div style="font-size:0.8rem; color:#666; font-weight:bold;">今期実績</div>
               <div style="font-size:1.4rem; font-weight:900; color:#333;">${formatMoney(t.a, unit)}</div>
             </div>
             <div style="flex:1; background:#f8f9fa; border:1px solid #eee; border-radius:6px; padding:10px; text-align:center;">
               <div style="font-size:0.8rem; color:#666; font-weight:bold;">全体予実差異額</div>
               <div style="font-size:1.4rem; font-weight:900; color:${tStyle.color};">${tStyle.prefix} ${formatMoney(Math.abs(t.diff), unit)}</div>
             </div>
           </div>
           <div class="action-hover print-btn" style="background-color:#f8f9fa; border-left:4px solid #0056b3; padding:12px 15px; margin-bottom:20px; border-radius:0 6px 6px 0; cursor:pointer; transition: 0.2s;"
                onclick="openActionPlanModal('${targetPeriod}', '${t.cd}', '${t.name}', '${actionParam}')" onmouseover="this.style.backgroundColor='#eaf2fa'" onmouseout="this.style.backgroundColor='#f8f9fa'">
             <div style="font-weight:bold; color:#0056b3; font-size:0.9rem; margin-bottom:5px; display:flex; align-items:center; gap:5px;">
               <span class="material-icons" style="font-size:1rem;">lightbulb</span> 今後のアクション <span style="font-size:0.75rem; color:#888; font-weight:normal;">(クリックで編集)</span>
             </div>
             <div style="color:#333; font-size:0.9rem; line-height:1.4;">${actionText.replace(/\n/g, '<br>')}</div>
           </div>
           
           <div style="display:none; background-color:#f8f9fa; border-left:4px solid #0056b3; padding:12px 15px; margin-bottom:20px; border-radius:0 6px 6px 0;" class="print-only-action">
             <div style="font-weight:bold; color:#0056b3; font-size:0.9rem; margin-bottom:5px; display:flex; align-items:center; gap:5px;">
               <span class="material-icons" style="font-size:1rem;">lightbulb</span> 今後のアクション
             </div>
             <div style="color:#333; font-size:0.9rem; line-height:1.4;">${actionText.replace(/\n/g, '<br>')}</div>
           </div>
           <div style="display:flex; gap:15px; align-items:stretch;">
       `;

       if(t.worst3 && t.worst3.length > 0) {
         t.worst3.forEach((w, idx) => {
            const numCircle = circles[idx] || "・";
            const errorWeight = t.totalErrorAbs > 0 ? ((w.diffAbs / t.totalErrorAbs) * 100).toFixed(1) : '0.0';
            const consumeRate = w.b > 0 ? ((w.a / w.b) * 100).toFixed(1) : (w.a > 0 ? '999' : '0.0');
            const wStyle = getVarianceStyle(w.diff);

            let barColor = '#36b9cc'; 
            let barWidth = Math.min(consumeRate, 100);
            if (consumeRate > 100) barColor = '#e74a3b'; 

            let pArr = Object.values(w.partners).map(p => { p.diff = p.a - p.b; return p; }).filter(p => Math.abs(Math.round(p.diff / unit)) > 0);
            let totalPartnerDiffAbs = 0; pArr.forEach(p => { totalPartnerDiffAbs += Math.abs(p.diff); });
            
            let partnerListHtml = '';
            if(pArr.length > 0) {
                pArr.sort((a,b) => Math.abs(b.diff) - Math.abs(a.diff));
                pArr.slice(0, 3).forEach(p => {
                    const pStyle = getVarianceStyle(p.diff);
                    let partnerPct = totalPartnerDiffAbs !== 0 ? Math.round((Math.abs(p.diff) / totalPartnerDiffAbs) * 100) : 0;
                    const pCmtKey = `${t.cd}_${w.name}__${p.name}`;
                    const currentSoukaiComment = soukaiComments[`${targetPeriod}_${pCmtKey}`] || '<span class="print-btn" style="color:#aaa; font-style:italic;">(クリックして入力...)</span>';
                    
                    const displayName = `${p.name} (${w.name})`.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                    const historyParam = encodeURIComponent(JSON.stringify(Array.from(p.history)));
                    const monthlyParam = encodeURIComponent(JSON.stringify({})); 
                    const currentCmtParam = encodeURIComponent(soukaiComments[`${targetPeriod}_${pCmtKey}`] || '');

                    partnerListHtml += `
                        <div onclick="openSoukaiCommentModal('${targetPeriod}', '${pCmtKey}', '${displayName}', '${historyParam}', '${currentCmtParam}', '${monthlyParam}')" 
                             style="cursor:pointer; background:#fff; border:1px solid #dce1e7; border-left:3px solid #1a73e8; border-radius:4px; padding:8px; margin-bottom:8px; transition:0.2s;" onmouseover="this.style.background='#f1f8ff'" onmouseout="this.style.background='#fff'">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                                <div style="font-weight:bold; color:#333; font-size:0.8rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:60%;">${p.name}</div>
                                <div style="font-size:0.8rem; text-align:right;">
                                    <span style="color:#888;">(誤差 ${partnerPct}%)</span>
                                    <span style="color:${pStyle.color}; font-weight:bold; margin-left:3px;">${pStyle.prefix}${formatMoney(Math.abs(p.diff), unit)}</span>
                                </div>
                            </div>
                            <div style="font-size:0.75rem; color:#555; background:#f8f9fa; padding:4px 6px; border-radius:3px; line-height:1.3; overflow:hidden;">
                                ${currentSoukaiComment}
                            </div>
                        </div>
                    `;
                });
            } else {
                partnerListHtml = '<div style="color:#888; font-size:0.8rem; padding:5px;">主要な差異取引先はありません</div>';
            }

            analysisHtml += `
              <div style="flex:1; border:1px solid #e0e0e0; border-radius:8px; padding:15px; display:flex; flex-direction:column; background:#fff; width:30%;">
                  <div style="font-size:1rem; font-weight:bold; color:#333; margin-bottom:10px;">${numCircle} ${w.name}</div>
                  <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:#555; margin-bottom:5px; font-weight:bold;">
                      <span>消化率: <span style="color:#1a73e8;">${consumeRate}%</span></span>
                      <span>影響度: <span>${errorWeight}%</span></span>
                  </div>
                  <div style="background:#e9ecef; border-radius:5px; height:8px; width:100%; margin-bottom:10px; overflow:hidden;">
                      <div style="background:${barColor}; height:100%; width:${barWidth}%; border-radius:5px;"></div>
                  </div>
                  <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:3px;">
                      <span style="color:#888;">予算: ${formatMoney(w.b, unit)}</span>
                      <span style="color:#888;">実績: ${formatMoney(w.a, unit)}</span>
                  </div>
                  <div style="text-align:right; font-weight:900; color:${wStyle.color}; font-size:1rem; margin-bottom:10px; border-bottom:1px dashed #ddd; padding-bottom:8px;">
                      差異: ${wStyle.prefix}${formatMoney(Math.abs(w.diff), unit)}
                  </div>
                  <div style="font-size:0.8rem; font-weight:bold; color:#555; margin-bottom:5px;">取引先別の要因分析</div>
                  <div style="flex:1; display:flex; flex-direction:column; gap:5px; background:#f4f6f9; padding:8px; border-radius:6px; border:1px solid #eee;">
                      ${partnerListHtml}
                  </div>
              </div>
            `;
         });
       }
       analysisHtml += `</div></div>`;
    });
    
    analysisHtml += `<style>@media print { .print-only-action { display: block !important; } }</style>`;
    analysisContainer.innerHTML = analysisHtml;
  }
</script>
